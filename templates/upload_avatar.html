<!-- upload_avatar.html -->
{% extends "base.html" %}
{% block title %}设置头像{% endblock %}
{% block content %}
<h1>设置头像</h1>

<h2 class="section-title">上传新图片</h2>
<form method="POST" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
        <input type="file" name="avatar" accept="image/*" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:auto">上传</button>
</form>

<hr class="section-divider">

<h2 class="section-title">从现有图片中选择</h2>
<p class="text-muted">点击下方任意图片，直接设置为头像</p>

<div class="avatar-grid">
    {% for image in images %}
    <div class="avatar-item" onclick="selectAvatar('{{ image }}')">
        <img src="{{ url_for('static', filename='images/' + image) }}" alt="{{ image }}">
    </div>
    {% else %}
    <p class="text-muted">暂无可用图片</p>
    {% endfor %}
</div>

<script>
function selectAvatar(filename) {
    fetch('/set-avatar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ avatar: 'images/' + filename })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) {
            showToast('头像设置成功！', 'success');
            setTimeout(function() { window.location.href = "{{ url_for('main.profile') }}"; }, 600);
        } else {
            showToast('设置失败：' + data.error, 'error');
        }
    })
    .catch(function(error) {
        showToast('请求出错：' + error, 'error');
    });
}
</script>
{% endblock %}
