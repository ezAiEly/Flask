<!-- contact.html -->
{% extends "base.html" %}
{% block title %}联系我们{% endblock %}
{% block content %}
<h1>联系我们</h1>
<p class="text-muted mb-2">有任何问题或建议？请填写下方表单。</p>

<div class="card">
    <form method="POST" novalidate>
        <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" name="name" placeholder="请输入姓名" required>
            <span class="error-text">请填写姓名</span>
        </div>
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" placeholder="请输入邮箱" required>
            <span class="error-text">请填写有效邮箱</span>
        </div>
        <div class="form-group">
            <label for="message">留言</label>
            <textarea id="message" name="message" rows="4" placeholder="请输入留言内容" required></textarea>
            <span class="error-text">请填写留言</span>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> 提交</button>
    </form>
</div>

{% if success %}
<div class="flash flash-success mt-2">
    <i class="fas fa-check-circle"></i> 提交成功！感谢你的留言。
</div>
{% endif %}
{% endblock %}
