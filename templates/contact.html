{% extends "base.html" %}
{% block title %}联系我们{% endblock %}
{% block content %}
    <h1>联系我们</h1>
    <form method="POST">
        <label>姓名：</label><br>
        <input type="text" name="name"><br><br>
        <label>邮箱：</label><br>
        <input type="email" name="email"><br><br>
        <label>留言：</label><br>
        <textarea name="message" rows="4"></textarea><br><br>
        <button type="submit">提交</button>
    </form>
    {% if success %}
        <p style="color: green;">提交成功！谢谢你的留言。</p>
    {% endif %}
{% endblock %}
