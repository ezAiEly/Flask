{% extends "base.html" %}
{% block title %}上传视频{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 560px;">
  <h1><i class="fas fa-cloud-upload-alt"></i> 上传视频</h1>

  <form id="uploadForm" method="POST" enctype="multipart/form-data" novalidate>
    <div class="form-group">
      <label for="title">视频标题 *</label>
      <input type="text" id="title" name="title" placeholder="输入视频标题" required maxlength="200">
      <span class="error-text">请输入视频标题</span>
    </div>

    <div class="form-group">
      <label for="description">视频简介</label>
      <textarea id="description" name="description" placeholder="简单介绍一下视频内容（可选）" maxlength="2000" rows="3"></textarea>
    </div>

    <div class="form-group">
      <label for="video_file">选择视频文件 *</label>
      <input type="file" id="video_file" name="video_file" accept="video/mp4,video/webm,video/x-matroska,video/quicktime,video/x-msvideo,video/x-flv" required>
      <span class="error-text">请选择视频文件</span>
      <div style="font-size:0.8rem;color:var(--color-text-muted);margin-top:4px;">
        支持 mp4, webm, mkv, avi, mov, flv 格式，最大 20GB
      </div>
    </div>

    <div class="form-group" id="progressGroup" style="display:none;">
      <label>上传进度</label>
      <div style="background:var(--color-border);border-radius:4px;height:6px;overflow:hidden;">
        <div id="progressBar" style="background:var(--color-primary);height:100%;width:0%;transition:width 0.3s;"></div>
      </div>
      <span id="progressText" style="font-size:0.8rem;color:var(--color-text-muted);"></span>
    </div>

    <button type="submit" class="btn btn-primary" id="submitBtn">
      <span class="btn-text"><i class="fas fa-upload"></i> 上传</span>
      <span class="spinner hidden" id="spinner"></span>
    </button>
  </form>
</div>

<script>
(function () {
  var form = document.getElementById('uploadForm');
  var fileInput = document.getElementById('video_file');
  var progressGroup = document.getElementById('progressGroup');
  var progressBar = document.getElementById('progressBar');
  var progressText = document.getElementById('progressText');
  var btn = document.getElementById('submitBtn');
  var btnText = btn.querySelector('.btn-text');
  var spinner = document.getElementById('spinner');

  form.addEventListener('submit', function (e) {
    var title = document.getElementById('title').value.trim();
    var hasError = false;

    if (!title) {
      document.getElementById('title').parentElement.classList.add('error');
      hasError = true;
    } else {
      document.getElementById('title').parentElement.classList.remove('error');
    }

    if (!fileInput.files.length) {
      fileInput.parentElement.classList.add('error');
      hasError = true;
    } else {
      fileInput.parentElement.classList.remove('error');
    }

    if (hasError) { e.preventDefault(); return; }

    // Basic size check
    var maxSize = 20 * 1024 * 1024 * 1024;
    if (fileInput.files[0].size > maxSize) {
      e.preventDefault();
      showToast('文件大小不能超过 20GB', 'error');
      return;
    }

    // Show progress UI
    progressGroup.style.display = 'block';
    btn.disabled = true;
    btnText.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 上传中...';
    spinner.classList.remove('hidden');

    // Simulate progress since HTML form submit doesn't give progress events
    var width = 0;
    var interval = setInterval(function () {
      width += Math.random() * 15;
      if (width > 90) { width = 90; clearInterval(interval); }
      progressBar.style.width = width + '%';
      progressText.textContent = Math.round(width) + '%';
    }, 300);
  });

  fileInput.addEventListener('change', function () {
    fileInput.parentElement.classList.remove('error');
  });
  document.getElementById('title').addEventListener('input', function () {
    this.parentElement.classList.remove('error');
  });
})();
</script>
{% endblock %}
