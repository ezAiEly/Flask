<!-- register.html -->
{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="form-container">
    <div class="form-brand" style="text-align:center;margin-bottom:1.5rem;">
      <i class="fas fa-play-circle" style="font-size:2.5rem;color:var(--pink-color);display:block;margin-bottom:0.25rem;"></i>
      <h1 style="font-size:1.3rem;font-weight:600;margin:0;">加入视频社区</h1>
      <p class="text-muted" style="font-size:0.85rem;margin-top:0.25rem;">注册账号，开启你的视频之旅</p>
    </div>
    <form id="registerForm" novalidate>
        <div class="form-group">
            <label for="username"><i class="fas fa-user"></i> 用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
            <span class="error-text" data-for="username"></span>
        </div>
        <div class="form-group">
            <label for="email"><i class="fas fa-envelope"></i> 邮箱</label>
            <input type="email" id="email" placeholder="请输入邮箱" required autocomplete="email">
            <span class="error-text" data-for="email"></span>
        </div>
        <div class="form-group">
            <label for="password"><i class="fas fa-lock"></i> 密码</label>
            <input type="password" id="password" placeholder="至少6位密码" minlength="6" required autocomplete="new-password">
            <span class="error-text" data-for="password"></span>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn" style="background:var(--pink-color);">
            <span class="btn-text"><i class="fas fa-user-plus"></i> 注册</span>
            <span class="spinner hidden" id="spinner"></span>
        </button>
    </form>
    <div class="form-footer">
        已有账号？<a href="{{ url_for('auth.login_page') }}">立即登录</a>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = document.getElementById('submitBtn');
    var btnText = btn.querySelector('.btn-text');
    var spinner = document.getElementById('spinner');
    btn.disabled = true;
    btnText.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 注册中...';
    spinner.classList.remove('hidden');

    var data = {
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
    };

    if (data.password.length < 6) {
        showToast('密码长度至少6位', 'error');
        btn.disabled = false;
        btnText.innerHTML = '<i class="fas fa-user-plus"></i> 注册';
        spinner.classList.add('hidden');
        return;
    }

    var params = new URLSearchParams(window.location.search);
    var nextUrl = params.get('next') || '/';

    try {
        var response = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        var result = await response.json();
        if (response.ok) {
            if (result.access_token) {
                localStorage.setItem('access_token', result.access_token);
            }
            showToast('注册成功！正在跳转...', 'success');
            setTimeout(function() { window.location.href = nextUrl; }, 600);
        } else {
            showToast(result.error || '注册失败', 'error');
        }
    } catch (error) {
        showToast('网络请求失败：' + error, 'error');
    } finally {
        btn.disabled = false;
        btnText.innerHTML = '<i class="fas fa-user-plus"></i> 注册';
        spinner.classList.add('hidden');
    }
});
</script>
{% endblock %}
