<!-- register.html -->
{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="form-container">
    <h1><i class="fas fa-user-plus"></i> 用户注册</h1>
    <form id="registerForm" novalidate>
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" required>
            <span class="error-text" data-for="username"></span>
        </div>
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" placeholder="请输入邮箱" required>
            <span class="error-text" data-for="email"></span>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码" minlength="6" required>
            <span class="error-text" data-for="password"></span>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">
            <span class="btn-text">注册</span>
            <span class="spinner hidden" id="spinner"></span>
        </button>
    </form>
    <div class="form-footer">
        已有账号？<a href="{{ url_for('login_page') }}">立即登录</a>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = document.getElementById('submitBtn');
    var btnText = btn.querySelector('.btn-text');
    var spinner = document.getElementById('spinner');
    btn.disabled = true;
    btnText.textContent = '注册中...';
    spinner.classList.remove('hidden');

    var data = {
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
    };

    if (data.password.length < 6) {
        showToast('密码长度至少6位', 'error');
        btn.disabled = false;
        btnText.textContent = '注册';
        spinner.classList.add('hidden');
        return;
    }

    var params = new URLSearchParams(window.location.search);
    var nextUrl = params.get('next') || '/';

    try {
        var response = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        var result = await response.json();
        if (response.ok) {
            if (result.access_token) {
                localStorage.setItem('access_token', result.access_token);
            }
            showToast('注册成功！正在跳转...', 'success');
            setTimeout(function() { window.location.href = nextUrl; }, 600);
        } else {
            showToast(result.error || '注册失败', 'error');
        }
    } catch (error) {
        showToast('网络请求失败：' + error, 'error');
    } finally {
        btn.disabled = false;
        btnText.textContent = '注册';
        spinner.classList.add('hidden');
    }
});
</script>
{% endblock %}
