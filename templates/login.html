<!-- login.html -->
{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="form-container">
    <div class="form-brand" style="text-align:center;margin-bottom:1.5rem;">
      <i class="fas fa-play-circle" style="font-size:2.5rem;color:var(--primary-color);display:block;margin-bottom:0.25rem;"></i>
      <h1 style="font-size:1.3rem;font-weight:600;margin:0;">登录视频社区</h1>
    </div>
    <form id="loginForm" novalidate>
        <div class="form-group">
            <label for="username"><i class="fas fa-user"></i> 用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
            <span class="error-text" data-for="username"></span>
        </div>
        <div class="form-group">
            <label for="password"><i class="fas fa-lock"></i> 密码</label>
            <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
            <span class="error-text" data-for="password"></span>
        </div>
        <div class="form-group captcha-group">
            <label for="captcha"><i class="fas fa-shield-alt"></i> 验证码</label>
            <div style="display:flex;align-items:center;gap:8px;">
                <input type="text" id="captcha" placeholder="请输入验证码" maxlength="4" required autocomplete="off" style="flex:1;">
                <img id="captchaImg" src="" alt="验证码" onclick="refreshCaptcha()" style="cursor:pointer;height:44px;border:1px solid var(--border-color);border-radius:6px;" title="点击刷新">
            </div>
            <span class="error-text" data-for="captcha"></span>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">
            <span class="btn-text"><i class="fas fa-sign-in-alt"></i> 登录</span>
            <span class="spinner hidden" id="spinner"></span>
        </button>
    </form>
    <div class="form-footer">
        还没有账号？<a href="{{ url_for('auth.register_page') }}">立即注册</a>
    </div>
</div>

<script>
function refreshCaptcha() {
    fetch('/api/captcha')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            document.getElementById('captchaImg').src = data.captcha;
        });
}
refreshCaptcha();

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = document.getElementById('submitBtn');
    var btnText = btn.querySelector('.btn-text');
    var spinner = document.getElementById('spinner');
    btn.disabled = true;
    btnText.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 登录中...';
    spinner.classList.remove('hidden');

    var data = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
        captcha: document.getElementById('captcha').value
    };
    var params = new URLSearchParams(window.location.search);
    var nextUrl = params.get('next') || '/';
    try {
        var response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        var result = await response.json();
        if (response.ok) {
            localStorage.setItem('access_token', result.access_token);
            showToast('登录成功，正在跳转...', 'success');
            setTimeout(function() { window.location.href = nextUrl; }, 600);
        } else {
            showToast(result.error || '登录失败', 'error');
        }
    } catch (error) {
        showToast('网络请求失败：' + error, 'error');
    } finally {
        btn.disabled = false;
        btnText.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登录';
        spinner.classList.add('hidden');
    }
});
</script>
{% endblock %}
