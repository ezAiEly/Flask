{% extends "base.html" %}
{% block title %}首页{% endblock %}
{% block content %}

{% if current_user %}
<div class="welcome-banner">
  <h2>欢迎回来，{{ current_user.username }}！</h2>
  <p class="text-muted">祝你今天愉快。</p>
</div>
{% endif %}

<!-- Hero Carousel -->
<div class="hero-carousel swiper" id="heroCarousel">
  <div class="swiper-wrapper" id="heroSlides">
    <div class="swiper-slide hero-slide-placeholder">
      <div class="hero-slide-content">
        <i class="fas fa-play-circle" style="font-size:3rem;opacity:0.3;"></i>
        <p class="text-muted">加载中…</p>
      </div>
    </div>
  </div>
  <div class="swiper-pagination"></div>
  <div class="swiper-button-prev"></div>
  <div class="swiper-button-next"></div>
</div>

<div class="home-tabs">
  <button class="home-tab active" data-tab="recommend">推荐</button>
  <button class="home-tab" data-tab="hot">热门</button>
</div>

<div class="video-grid" id="videoGrid"></div>

<div class="home-status text-center mt-2" id="homeStatus">
  <div class="spinner spinner-dark"></div>
  <p class="text-muted">加载中…</p>
</div>

<div class="text-center mt-2 hidden" id="loadMoreWrap">
  <button class="btn btn-outline" id="loadMoreBtn">加载更多</button>
</div>

<div class="empty-state hidden" id="emptyState">
  <i class="fas fa-video empty-state-icon"></i>
  <h2>还没有视频</h2>
  <p class="text-muted">成为第一个上传视频的人吧！</p>
  {% if current_user %}
  <a href="{{ url_for('video.upload_video') }}" class="btn btn-primary mt-2"><i class="fas fa-cloud-upload-alt"></i> 上传视频</a>
  {% else %}
  <a href="{{ url_for('auth.login_page') }}" class="btn btn-primary mt-2"><i class="fas fa-sign-in-alt"></i> 登录后上传</a>
  {% endif %}
</div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/home.js') }}"></script>
{% endblock %}
