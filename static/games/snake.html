<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:Arial,sans-serif;overflow:hidden}
.game-box{text-align:center;color:#eee}
.game-box h1{font-size:2rem;margin-bottom:8px;color:#e94560}
.scores{display:flex;justify-content:center;gap:20px;margin-bottom:12px;font-size:0.95rem}
.scores span{color:#e94560;font-weight:bold}
canvas{border:2px solid #e94560;border-radius:4px;display:block;margin:0 auto;background:#16213e}
.controls{margin-top:12px;display:flex;justify-content:center;gap:8px}
.btn{background:#e94560;color:#fff;border:none;padding:8px 24px;border-radius:4px;font-size:0.9rem;cursor:pointer;font-weight:bold}
.btn:hover{opacity:0.85}
.hint{color:#888;font-size:0.8rem;margin-top:8px}
.dpad{display:none;margin-top:12px}
.dpad-row{display:flex;justify-content:center;gap:4px;margin-bottom:4px}
.dpad-btn{width:54px;height:54px;background:#e94560;color:#fff;border:none;border-radius:8px;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.dpad-btn:active{background:#c73a52}
@media(max-width:600px){.dpad{display:block}.hint{display:none}}
</style>
</head>
<body>
<div class="game-box">
  <h1>🐍 贪吃蛇</h1>
  <div class="scores">得分: <span id="score">0</span> 最高: <span id="best">0</span></div>
  <canvas id="canvas"></canvas>
  <div class="controls"><button class="btn" onclick="restart()">重新开始</button></div>
  <p class="hint">方向键移动 / 移动端使用下方按钮</p>
  <div class="dpad">
    <div class="dpad-row"><button class="dpad-btn" onclick="setDir('up')">▲</button></div>
    <div class="dpad-row">
      <button class="dpad-btn" onclick="setDir('left')">◄</button>
      <button class="dpad-btn" onclick="setDir('down')">▼</button>
      <button class="dpad-btn" onclick="setDir('right')">►</button>
    </div>
  </div>
</div>
<script>
(function(){
var canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
var cell=20,cols,rows,score=0,best=parseInt(localStorage.getItem('bestsnake'))||0;
var snake,dir,nextDir,food,gameOver,interval,loopMs=100;
document.getElementById('best').textContent=best;

function resize(){
  var maxW=Math.min(window.innerWidth-20,400),maxH=Math.min(window.innerHeight-280,400);
  cols=Math.floor(maxW/cell);rows=Math.floor(maxH/cell);
  canvas.width=cols*cell;canvas.height=rows*cell;
}
function init(){
  resize();score=0;document.getElementById('score').textContent='0';
  var cx=Math.floor(cols/2),cy=Math.floor(rows/2);
  snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir='right';nextDir='right';gameOver=false;spawnFood();
  if(interval)clearInterval(interval);
  interval=setInterval(tick,loopMs);
}
function spawnFood(){
  var free=[];
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
    if(!snake.some(function(s){return s.x===c&&s.y===r}))free.push({x:c,y:r});
  }
  food=free[Math.floor(Math.random()*free.length)];
}
function tick(){
  if(gameOver)return;dir=nextDir;
  var head=snake[0],newHead={x:head.x,y:head.y};
  if(dir==='right')newHead.x++;else if(dir==='left')newHead.x--;
  else if(dir==='up')newHead.y--;else if(dir==='down')newHead.y++;

  if(newHead.x<0||newHead.x>=cols||newHead.y<0||newHead.y>=rows){end();return;}
  if(snake.some(function(s){return s.x===newHead.x&&s.y===newHead.y})){end();return;}

  snake.unshift(newHead);
  if(newHead.x===food.x&&newHead.y===food.y){
    score+=10;document.getElementById('score').textContent=score;
    if(score>best){best=score;document.getElementById('best').textContent=best;localStorage.setItem('bestsnake',best);}
    spawnFood();
  }else{snake.pop();}
  draw();
}
function end(){gameOver=true;clearInterval(interval);draw();}
function draw(){
  ctx.fillStyle='#16213e';ctx.fillRect(0,0,canvas.width,canvas.height);
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.5;
  for(var r=0;r<=rows;r++){ctx.beginPath();ctx.moveTo(0,r*cell);ctx.lineTo(cols*cell,r*cell);ctx.stroke();}
  for(var c=0;c<=cols;c++){ctx.beginPath();ctx.moveTo(c*cell,0);ctx.lineTo(c*cell,rows*cell);ctx.stroke();}
  // Food
  ctx.fillStyle='#e94560';ctx.beginPath();ctx.arc(food.x*cell+cell/2,food.y*cell+cell/2,cell/2-2,0,Math.PI*2);ctx.fill();
  // Snake
  snake.forEach(function(s,i){
    ctx.fillStyle=i===0?'#0f3460':'#1a508b';ctx.fillRect(s.x*cell+1,s.y*cell+1,cell-2,cell-2);
    if(i===0){ctx.fillStyle='#fff';ctx.fillRect(s.x*cell+6,s.y*cell+4,3,3);ctx.fillRect(s.x*cell+cell-9,s.y*cell+4,3,3);}
  });
  if(gameOver){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#e94560';ctx.font='bold 28px Arial';ctx.textAlign='center';
    ctx.fillText('游戏结束',canvas.width/2,canvas.height/2-10);
    ctx.fillStyle='#fff';ctx.font='16px Arial';
    ctx.fillText('得分: '+score+' — 点击"重新开始"',canvas.width/2,canvas.height/2+25);
  }
}
window.setDir=function(d){
  var opp={up:'down',down:'up',left:'right',right:'left'};
  if(opp[d]!==dir)nextDir=d;
};
window.restart=init;
document.addEventListener('keydown',function(e){
  var map={37:'left',38:'up',39:'right',40:'down'};
  if(map[e.keyCode]){e.preventDefault();setDir(map[e.keyCode]);}
});
var tsx,tsy;
document.addEventListener('touchstart',function(e){tsx=e.touches[0].clientX;tsy=e.touches[0].clientY});
document.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tsx,dy=e.changedTouches[0].clientY-tsy;
  if(Math.abs(dx)<30&&Math.abs(dy)<30)return;
  setDir(Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up'));
});
init();
})();
</script>
</body>
</html>
